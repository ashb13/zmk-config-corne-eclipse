name: Build ZMK firmware

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3

  release:
    name: Draft Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create per-layout zips
        run: |
          mkdir -p release

          # Group .uf2 files by layout
          for file in artifacts/firmware/*.uf2; do
            [ -f "$file" ] || continue
            basename=$(basename "$file")
            layout=$(echo "$basename" | sed 's/^left_corne_eclipse_//;s/^right_corne_eclipse_//;s/\.zmk\.uf2$//')
            mkdir -p "staging/$layout"
            cp "$file" "staging/$layout/"
          done

          # Zip each layout
          if [ -d staging ]; then
            for layout_dir in staging/*/; do
              layout=$(basename "$layout_dir")
              zip -j "release/corne_eclipse_${layout}.zip" "$layout_dir"*
            done
          fi

          # Include reset firmware
          cp assets/references/settings_reset-nice_nano_v2-zmk.uf2 release/

          echo "Release contents:"
          ls -la release/

      - name: Generate release notes
        id: notes
        run: |
          # Get the latest release tag (if any)
          LAST_TAG=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ] && git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" --)
          else
            COMMITS=$(git log --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" --)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- No new commits since last release"
          fi

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-${{ github.run_number }}
          name: Firmware Build ${{ github.run_number }}
          files: release/*
          body: |
            ${{ steps.notes.outputs.commits }}

            ---

            Each zip contains left and right `.uf2` firmware files. Extract the zip and follow the [flashing guide](https://github.com/${{ github.repository }}/blob/main/FLASHING.md) to install.

            [Click here to view the keymap for this release](https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/assets/images/samurai-legend-utility.png)
