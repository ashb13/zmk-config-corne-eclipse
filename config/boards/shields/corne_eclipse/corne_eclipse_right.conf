# RGB HARDWARE *****************************************************************
#*******************************************************************************

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# ENCODER CONFIGURATION ********************************************************
# Harmlessly ignored when encoder node is disabled (trackpad builds)
#*******************************************************************************

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# MOUSE EMULATION *************************************************************
#*******************************************************************************

CONFIG_ZMK_POINTING=y

# OLED CONFIGURATION ***********************************************************
# https://zmk.dev/docs/config/displays
#*******************************************************************************

# enable/disable
CONFIG_ZMK_DISPLAY=y

# oled status panel style (recommended: custom)
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# work queue for display updates (recommended: dedicated)
#CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# USB/VBUS DETECTION ***********************************************************
# nrfx_power gives us VBUS events without pulling in the full USB device stack.
# The ZMK fork uses this to encode the peripheral's charging state into the
# high bit of its BAS battery byte so the central can render it.
#*******************************************************************************

CONFIG_NRFX_POWER=y
