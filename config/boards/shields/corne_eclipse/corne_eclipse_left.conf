# RGB HARDWARE *****************************************************************
#*******************************************************************************

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# ENCODER CONFIGURATION ********************************************************
#*******************************************************************************

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# MOUSE EMULATION *************************************************************
#*******************************************************************************

CONFIG_ZMK_POINTING=y

# PERIPHERAL BATTERY ***********************************************************
#*******************************************************************************

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Mirror the central's battery state over the split service so the peripheral's
# nice!view can render both cells alongside the logo.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_MIRROR=y

# Workaround for zmkfirmware/zmk#392: Windows (and sometimes Linux) doesn't
# re-subscribe to BAS notifications on reconnect, so the host caches whatever
# level was read at pair time and never updates. Disabling Zephyr's
# subscription-required enforcement lets the notifications flow anyway.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# HID INDICATORS ***************************************************************
#*******************************************************************************

CONFIG_ZMK_HID_INDICATORS=y

# OLED CONFIGURATION ***********************************************************
# https://zmk.dev/docs/config/displays
#*******************************************************************************

# enable/disable
CONFIG_ZMK_DISPLAY=y

# oled status panel style (recommended: custom)
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# work queue for display updates (recommended: dedicated)
#CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
