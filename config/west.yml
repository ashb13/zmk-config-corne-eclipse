manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: frosthaven
      url-base: https://github.com/Frosthaven
    - name: aym1607
      url-base: https://github.com/AYM1607
    - name: petejohanson
      url-base: https://github.com/petejohanson
  projects:
    - name: zmk
      remote: frosthaven
      revision: v0.3-peripheral-charging-bit
      import: app/west.yml
    - name: zmk-ext-power-smart-idle
      remote: frosthaven
      # Pinned to last known-good commit. Newer commits in main introduced
      # DT_NODELABEL -> DT_COMPAT lookup change and boot-grace flag that
      # break on-battery auto-off and cause red instead of blue RGB.
      revision: 6511488dc58dbbcf9add0b691b1e81e130d7a3fe
    - name: zmk-driver-azoteq-iqs5xx
      remote: aym1607
      revision: main
    - name: cirque-input-module
      remote: petejohanson
      revision: main
  self:
    path: config
